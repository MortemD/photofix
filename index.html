<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Фото Фиикс</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon 2.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon 1.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/reset.css">
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/utils.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="main-area">
            <div class="area">
                <div class="photo">
                    <button class="simple-btn">
                        <img class="btn-img normal" src="assets/upload.svg" alt="Выбрать фото">
                        <img class="btn-img hover" src="assets/hover-upload.svg" alt="Выбрать фото">
                    </button>
                    <div class="added-btns">
                        <button class="simple-btn">
                            <img class="added-img normal" src="assets/upgrade.svg" alt="Улучшить фото">
                            <img class="added-img hover" src="assets/hover-upgrade.svg" alt="Улучшить фото">
                        </button>
                        <button class="simple-btn">
                            <img class="added-img normal" src="assets/change.svg" alt="Сменить фото">
                            <img class="added-img hover" src="assets/hover-change.svg" alt="Сменить фото">
                        </button>
                    </div>
                </div>
                <div class="photo empty">
                    <div class="download-btn">
                        <button class="simple-btn">
                            <img class="added-img normal" src="assets/download.svg" alt="Скачать фото">
                            <img class="added-img hover" src="assets/hover-download.svg" alt="Скачать фото">
                        </button>
                    </div>
                </div>
            </div>
            <div class="area">
                <div class="logo">
                    <img src="assets/logo.svg" alt="">
                </div>
                <div class="data">
                    <div class="text-block">
                        <p class="title-text disabled" id="statusTitle">Статус</p>
                        <p class="data-text disabled" id="statusValue">X</p>
                    </div>
                    <div class="text-block">
                        <p class="title-text disabled" id="progressTitle">Прогресс</p>
                        <p class="data-text disabled" id="progressValue">X</p>
                    </div>
                    <div class="text-block">
                        <p class="title-text disabled" id="formatTitle">Формат</p>
                        <p class="data-text disabled" id="formatValue">X</p>
                    </div>
                    <div class="text-block">
                        <p class="title-text disabled" id="brightnessTitle">Яркость</p>
                        <p class="data-text disabled" id="brightnessValue">X</p>
                    </div>
                    <div class="text-block">
                        <p class="title-text disabled" id="sizeTitle">Размер</p>
                        <p class="data-text disabled" id="sizeValue">X</p>
                    </div>
                    <div class="text-block">
                        <p class="title-text disabled" id="timeTitle">Время</p>
                        <p class="data-text disabled" id="timeValue">X</p>
                    </div>
                    <div class="text-block">
                        <p class="title-text disabled" id="resolutionTitle">Разрешение</p>
                        <p class="data-text disabled" id="resolutionValue">X</p>
                    </div>
                    <div class="text-block">
                        <p class="title-text disabled" id="saturationTitle">Цветность</p>
                        <p class="data-text disabled" id="saturationValue">X</p>
                    </div>
                    <div class="text-block wide">
                        <p class="title-text disabled" id="nameTitle">Название</p>
                        <p class="data-text disabled" id="nameValue">X</p>
                    </div>
                    <div class="text-block">
                        <p class="title-text disabled" id="contrastTitle">Контрастность</p>
                        <p class="data-text disabled" id="contrastValue" >X</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
